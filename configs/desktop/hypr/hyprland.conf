# ══════════════════════════════════════════════════════════════
#  hyprland.conf
#  Источник: ~/.dotfiles/configs/desktop/hypr/hyprland.conf
#  Symlink устанавливается скриптом install-desktop.sh
# ══════════════════════════════════════════════════════════════

# ─── NVIDIA ENV VARS (убери если нет Nvidia) ──────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,kde

# ─── MONITOR ──────────────────────────────────────────────────
# Авто-определение (подстрой под свой монитор если нужно)
monitor = , preferred, auto, 1

# ─── AUTOSTART ────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ─── INPUT ────────────────────────────────────────────────────
input {
    kb_layout  = us,ru
    kb_options = grp:alt_shift_toggle   # Shift+Alt — переключение языка
    kb_variant = ,
    kb_model   =

    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
    }
}

# ─── GENERAL ──────────────────────────────────────────────────
general {
    gaps_in   = 5
    gaps_out  = 10
    border_size = 2
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    allow_tearing = false
}

# ─── DECORATION ───────────────────────────────────────────────
decoration {
    rounding = 10
    blur {
        enabled = true
        size    = 8
        passes  = 2
        new_optimizations = true
    }
    drop_shadow   = true
    shadow_range  = 8
    shadow_render_power = 2
    col.shadow = rgba(1a1a1aee)
}

# ─── ANIMATIONS ───────────────────────────────────────────────
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows,     1, 7,  myBezier
    animation = windowsOut,  1, 7,  default, popin 80%
    animation = border,      1, 10, default
    animation = borderangle, 1, 8,  default
    animation = fade,        1, 7,  default
    animation = workspaces,  1, 6,  default
}

# ─── LAYOUT ───────────────────────────────────────────────────
dwindle {
    pseudotile       = true
    preserve_split   = true
}

master {
    new_is_master = true
}

# ─── MISC ─────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
}

# ─── GESTURES ─────────────────────────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# ══════════════════════════════════════════════════════════════
#  KEYBINDINGS
# ══════════════════════════════════════════════════════════════
$mainMod = SUPER

# Приложения
bind = $mainMod, Return,    exec, alacritty
bind = $mainMod, E,         exec, nautilus
bind = $mainMod, B,         exec, firefox
bind = $mainMod, T,         exec, telegram-desktop

# Rofi launcher
bind = $mainMod, D,         exec, rofi -show drun -show-icons
bind = $mainMod, Tab,       exec, rofi -show window -show-icons

# Скриншоты
bind = , Print,             exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,        exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, S,   exec, grim -g "$(slurp)" - | wl-copy

# Управление окнами
bind = $mainMod, Q,         killactive
bind = $mainMod, M,         exit
bind = $mainMod, V,         togglefloating
bind = $mainMod, P,         pseudo
bind = $mainMod, J,         togglesplit
bind = $mainMod, F,         fullscreen

# Фокус
bind = $mainMod, left,      movefocus, l
bind = $mainMod, right,     movefocus, r
bind = $mainMod, up,        movefocus, u
bind = $mainMod, down,      movefocus, d

# Перемещение окон
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Воркспейсы (1–9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Переместить окно на воркспейс
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Скролл по воркспейсам мышью
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Перетаскивание окон мышью
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Громкость (PipeWire / pactl)
bindel = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# Яркость
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ──────────────────────────────────────────────────────────────
#  WINDOW RULES
# ──────────────────────────────────────────────────────────────
windowrule = float,   ^(pavucontrol)$
windowrule = float,   ^(blueman-manager)$
windowrule = float,   ^(nm-connection-editor)$

# Steam
windowrule = float,   ^(steam)$
windowrule = size 1200 800, ^(steam)$

# Telegram
windowrule = workspace 9 silent, ^(TelegramDesktop)$
